            try {
                const data = JSON.parse(e.target.result);
                if (typeof data !== 'object' || Array.isArray(data)) throw new Error('格式错误');
                Object.keys(data).forEach(group => {
                    if (!wordCardGroups[group]) wordCardGroups[group] = [];
                    if (Array.isArray(data[group])) {
                        data[group].forEach(card => {
                            if (!wordCardGroups[group].includes(card)) wordCardGroups[group].push(card);
                        });
                    }
                });
                if (!currentGroup || !wordCardGroups[currentGroup]) currentGroup = Object.keys(wordCardGroups)[0];
                saveData();
                renderCardPanel();
                showToast('字卡已导入');
            } catch (err) {
                showToast('导入失败，文件格式错误');
            }
        };
        reader.readAsText(file);
    }

    function bindEvents() {
        DOM.partnerHeader.onclick = (e) => { if (e.target === DOM.partnerHeaderName) changeName('partner'); };
        DOM.selfHeader.onclick = (e) => { if (e.target === DOM.selfHeaderAvatar || e.target.closest('.small-avatar')) changeAvatar('self'); else if (e.target === DOM.selfHeaderName) changeName('self'); };
        let headerPartnerClickTimer = null;
        DOM.partnerHeaderAvatar.addEventListener('click', (e) => { if (headerPartnerClickTimer) { clearTimeout(headerPartnerClickTimer); headerPartnerClickTimer = null; addPatMessage(true); } else { headerPartnerClickTimer = setTimeout(() => { headerPartnerClickTimer = null; changeAvatar('partner'); }, 300); } });
        DOM.avatarUpload.onchange = async (e) => { let f = e.target.files[0]; if (f) { let c = await compressImage(f, 160, 0.6); if (currentAvatarEditType === 'partner') partnerInfo.avatar = c; else selfInfo.avatar = c; updateHeaderUI(); saveData(); renderMessages(); } DOM.avatarUpload.value = ''; };
        DOM.phoneBtn.onclick = () => initiateCall(); DOM.letterBtn.onclick = () => openLetterPanel(); DOM.cardBtn.onclick = () => { renderCardPanel(); DOM.cardMask.classList.add('show'); };
        DOM.outgoingHangupBtn.onclick = () => cancelOutgoingCall(); DOM.callMiniHangupBtn.onclick = () => endCall(); DOM.acceptCallBtn.onclick = () => acceptCall(); DOM.rejectCallBtn.onclick = () => rejectCall();
        document.getElementById('closeCardBtn').onclick = () => { DOM.cardMask.classList.remove('show'); saveData(); };
        document.getElementById('deleteGroupBtn').onclick = () => { if (Object.keys(wordCardGroups).length <= 1) return; if (confirm(`删除「${currentGroup}」？`)) { delete wordCardGroups[currentGroup]; currentGroup = Object.keys(wordCardGroups)[0]; renderCardPanel(); saveData(); } };
        document.getElementById('batchAddButton').onclick = () => { const textarea = document.getElementById('batchCardInput'); const lines = textarea.value.split('\n').filter(l => l.trim()); if (!lines.length) return; if (!wordCardGroups[currentGroup]) wordCardGroups[currentGroup] = []; let added = 0; lines.forEach(l => { let card = l.trim(); if (card && !wordCardGroups[currentGroup].includes(card)) { wordCardGroups[currentGroup].push(card); added++; } }); if (added) { renderCardPanel(); saveData(); textarea.value = ''; } };
        document.getElementById('addGroupBtn').onclick = () => { let name = document.getElementById('newGroupNameInput').value.trim(); if (name && !wordCardGroups[name]) { wordCardGroups[name] = []; currentGroup = name; renderCardPanel(); document.getElementById('newGroupNameInput').value = ''; saveData(); } };
        document.getElementById('exportCardsBtn').onclick = () => exportCards();
        document.getElementById('importCardsBtn').onclick = () => DOM.importCardsFileInput.click();
        DOM.importCardsFileInput.onchange = (e) => { const file = e.target.files[0]; if (file) { importCards(file); } DOM.importCardsFileInput.value = ''; };
        if (DOM.cardSearchInput) { DOM.cardSearchInput.addEventListener('input', () => { renderCardPanel(DOM.cardSearchInput.value); }); }
        DOM.closeLetterBtn.onclick = () => DOM.letterMask.classList.remove('show');
        document.querySelectorAll('.letter-tab').forEach(tab => { tab.onclick = () => renderLetterTabs(tab.dataset.tab); });
        DOM.messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); let txt = DOM.messageInput.value.trim(); if (txt) { sendMessage(txt, false); DOM.messageInput.value = ''; } } });
        DOM.imageGalleryBtn.onclick = () => DOM.imageFileInput.click();
        DOM.imageFileInput.onchange = async (e) => { for (let f of Array.from(e.target.files)) { if (f.type.startsWith('image/')) { let c = await compressImage(f); sendMessage('', false, 'image', c); } } DOM.imageFileInput.value = ''; };
        DOM.previewMask.onclick = () => { DOM.previewMask.classList.remove('show'); DOM.previewImg.src = ''; };
        DOM.composeHalfCloseBtn.onclick = () => closeComposePanel(); DOM.composeHalfCancelBtn.onclick = () => closeComposePanel(); DOM.composeHalfSendBtn.onclick = () => sendLetterFromPanel();
        DOM.composeHalfOverlay.addEventListener('click', (e) => { if (e.target === DOM.composeHalfOverlay) closeComposePanel(); });
        DOM.readLetterClose.onclick = () => DOM.readLetterMask.classList.remove('show');
    }

    (async function init() {
        await registerServiceWorker(); requestNotificationPermission(); loadData(); bindEvents(); renderMessages(); startKeepAlive(); startProactiveMessages(); scheduleProactiveLetter();
        window.addEventListener('beforeunload', () => { if (replyTimer) clearTimeout(replyTimer); if (callTimerInterval) clearInterval(callTimerInterval); if (proactiveInterval) clearTimeout(proactiveInterval); if (proactiveLetterTimer) clearTimeout(proactiveLetterTimer); stopKeepAlive(); releaseWakeLock(); saveData(); });
        document.addEventListener('click', (e) => { if (activeMenu && !activeMenu.contains(e.target)) closeMenu(); });
    })();
})();
</script>
</body>
</html>
